name: Terraform Apply (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment (dev, staging, prod)"
        type: string
        required: true
      location:
        description: "Azure region"
        type: string
        required: true
      state_key:
        description: "Terraform state file key"
        type: string
        required: true
      artifact_name:
        description: "Name of the plan artifact to download"
        type: string
        required: true
      tf_version:
        description: "Terraform version"
        type: string
        default: "1.15.2"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_STATE_RESOURCE_GROUP:
        required: true
      TF_STATE_STORAGE_ACCOUNT:
        required: true
      TF_STATE_CONTAINER:
        required: true
      MODULES_GITHUB_TOKEN:
        required: true

jobs:
  apply:
    name: "Apply — ${{ inputs.environment }}"
    runs-on: ubuntu-latest

    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_location: ${{ inputs.location }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Git for Terraform modules
        env:
          TOKEN: ${{ secrets.MODULES_GITHUB_TOKEN }}
        run: |
          git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ inputs.state_key }}" \
            -backend-config="use_azuread_auth=true"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan