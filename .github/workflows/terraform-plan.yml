name: Terraform Plan (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment (dev, staging, prod)"
        type: string
        required: true
      location:
        description: "Azure region"
        type: string
        required: true
      state_key:
        description: "Terraform state file key"
        type: string
        required: true
      layer_name:
        description: "Human readable name for PR comment"
        type: string
        required: true
      tf_version:
        description: "Terraform version"
        type: string
        default: "1.15.2"
      tflint_version:
        description: "TFLint version"
        type: string
        default: "v0.50.3"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      TF_STATE_RESOURCE_GROUP:
        required: true
      TF_STATE_STORAGE_ACCOUNT:
        required: true
      TF_STATE_CONTAINER:
        required: true
      MODULES_GITHUB_TOKEN:
        required: true
    outputs:
      artifact-name:
        description: "Name of the uploaded plan artifact"
        value: ${{ jobs.plan.outputs.artifact-name }}

permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write

jobs:
  plan:
    name: "Plan — ${{ inputs.layer_name }}"
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}

    env:
      TF_VAR_environment: ${{ inputs.environment }}
      TF_VAR_location: ${{ inputs.location }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: true

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ inputs.tflint_version }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-${{ inputs.environment }}.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-${{ inputs.environment }}.sarif
          category: checkov-${{ inputs.environment }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Git for Terraform modules
        env:
          TOKEN: ${{ secrets.MODULES_GITHUB_TOKEN }}
        run: |
          git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ inputs.state_key }}" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: TFLint
        id: tflint
        run: |
          tflint --init
          tflint --no-color --minimum-failure-severity=error

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Store Plan Output
        id: plan-output
        run: |
          PLAN=$(cat plan.txt)
          echo "PLAN<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set Artifact Name
        id: set-artifact-name
        run: echo "name=tfplan-${{ inputs.environment }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: tfplan
          retention-days: 1

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const layerName = "${{ inputs.layer_name }}";
            const output = `### ${ layerName } — Terraform Plan

            | Step | Result |
            |------|--------|
            | Format | \`${{ steps.fmt.outcome }}\` |
            | Init | \`${{ steps.init.outcome }}\` |
            | Validate | \`${{ steps.validate.outcome }}\` |
            | TFLint | \`${{ steps.tflint.outcome }}\` |
            | Plan | \`${{ steps.plan.outcome }}\` |

            <details><summary>📋 Show Plan Output</summary>

            \`\`\`terraform
            ${{ steps.plan-output.outputs.PLAN }}
            \`\`\`

            </details>

            > Triggered by @${{ github.actor }} via \`${{ github.event_name }}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(layerName + ' — Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }
